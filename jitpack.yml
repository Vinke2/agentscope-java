jdk:
  - openjdk17
before_install:
  - sdk install maven 3.9.9
  - sdk use maven 3.9.9
install:
  - mvn clean install -DskipTests -Dspotless.check.skip=true -Drevision=$VERSION -pl agentscope-dependencies-bom,agentscope-core,agentscope-harness,agentscope-extensions,agentscope-distribution --also-make
