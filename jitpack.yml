jdk:
  - openjdk17
before_install:
  - sdk install maven 3.9.9
  - sdk use maven 3.9.9
  - curl -fsSL https://unofficial-builds.nodejs.org/download/release/v18.20.8/node-v18.20.8-linux-x64-glibc-217.tar.gz -o /tmp/node-v18.tar.gz
  - mkdir -p /tmp/node18 && tar xzf /tmp/node-v18.tar.gz -C /tmp/node18 --strip-components=1
  - sed -i 's|<npmVersion>10.9.2</npmVersion>|<npmVersion>10.9.2</npmVersion>\n  <nodeExecutable>/tmp/node18/bin/node</nodeExecutable>\n  <npmExecutable>/tmp/node18/bin/npm</npmExecutable>|' agentscope-examples/agents/agentscope-builder/pom.xml
install:
  - mvn clean install -DskipTests -Dspotless.check.skip=true -Drevision=$VERSION
